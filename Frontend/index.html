<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Smart Payment Wallet - Nhóm 10</title>

    <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>

    <style>
      body {
        font-family: Arial;
        background: #f4f6fb;
        margin: 0;
      }

      header {
        background: linear-gradient(135deg, #2f54eb, #722ed1);
        color: white;
        padding: 20px;
        text-align: center;
        font-size: 26px;
        font-weight: bold;
      }

      .container {
        width: 1100px;
        margin: auto;
        margin-top: 30px;
      }

      .wallet-card {
        background: linear-gradient(135deg, #2f54eb, #722ed1);
        color: white;
        padding: 30px;
        border-radius: 15px;
        margin-bottom: 20px;
      }

      .balance {
        font-size: 30px;
        margin-top: 10px;
      }

      .address {
        font-size: 14px;
        opacity: 0.9;
        margin-top: 10px;
      }

      .dashboard {
        display: flex;
        gap: 20px;
        margin-bottom: 20px;
      }

      .stat {
        flex: 1;
        background: white;
        padding: 20px;
        border-radius: 10px;
        text-align: center;
        font-size: 18px;
        font-weight: bold;
      }

      .card {
        background: white;
        padding: 20px;
        border-radius: 10px;
        margin-bottom: 20px;
      }

      input {
        width: 100%;
        padding: 10px;
        margin-top: 5px;
        margin-bottom: 10px;
        border-radius: 6px;
        border: 1px solid #ddd;
      }

      button {
        background: #2f54eb;
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 6px;
        cursor: pointer;
      }

      button:hover {
        background: #1d39c4;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th {
        background: #2f54eb;
        color: white;
        padding: 12px;
      }

      td {
        padding: 10px;
        border-bottom: 1px solid #eee;
        text-align: center;
      }

      .action-btn {
        padding: 6px 12px;
        font-size: 12px;
        margin: 2px;
      }
    </style>
  </head>

  <body>
    <header>Smart Payment Wallet DApp - Nhóm 10</header>

    <div class="container">
      <div class="wallet-card">
        <h2>💳 Smart Wallet</h2>

        <div class="balance" id="balance">0 ETH</div>

        <div class="address" id="address">Chưa kết nối ví</div>

        <br />

        <button onclick="connectWallet()">Kết nối MetaMask</button>
      </div>

      <div class="dashboard">
        <div class="stat">
          Tổng giao dịch
          <br />
          <span id="totalTx">0</span>
        </div>

        <div class="stat">
          Đã thực thi
          <br />
          <span id="doneTx">0</span>
        </div>

        <div class="stat">
          Chờ xác nhận
          <br />
          <span id="pendingTx">0</span>
        </div>
      </div>

      <div class="card">
        <h3>💸 Tạo giao dịch</h3>

        <label>Địa chỉ nhận</label>
        <input id="to" placeholder="0x..." />

        <label>Số ETH</label>
        <input id="amount" placeholder="0.01" />

        <button onclick="submitTransaction()">Tạo giao dịch</button>
      </div>

      <div class="card">
        <h3>📜 Lịch sử giao dịch</h3>

        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Người nhận</th>
              <th>Số ETH</th>
              <th>Confirm</th>
              <th>Trạng thái</th>
              <th>Hành động</th>
            </tr>
          </thead>

          <tbody id="txTable"></tbody>
        </table>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
